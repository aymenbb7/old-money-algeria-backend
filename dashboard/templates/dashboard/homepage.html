{% extends 'dashboard/base.html' %}

{% block content %}
<style>
    .section-card {
        background: var(--card-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.5rem;
    }
    .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.4rem;
        color: var(--accent-gold);
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; color: var(--text-muted); font-size: 0.9rem; }
    .form-control { width: 100%; padding: 0.8rem; background: #1A1A1A; border: 1px solid #333; color: var(--text-main); border-radius: 4px; }
    
    .product-list {
        max-height: 200px;
        overflow-y: auto;
        background: #111;
        border: 1px solid var(--border-color);
        padding: 0.5rem;
        border-radius: 4px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.5rem;
    }
    .product-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        background: #1A1A1A;
        padding: 0.5rem;
        border-radius: 4px;
        border: 1px solid #333;
    }
    .product-item input {
        cursor: pointer;
    }
</style>

<div class="dashboard-header" style="margin-bottom: 2rem;">
    <h1 class="brand-font" style="font-size: 2rem; color: var(--text-main);">Homepage Sections & Config</h1>
    <p style="color: var(--text-muted);">Manage the homepage value props and product sections.</p>
</div>

<!-- VALUE PROPS CONFIG -->
<div class="card" style="margin-bottom: 2rem;">
    <h3 class="brand-font" style="margin-bottom: 1.5rem; color: var(--accent-gold);">Homepage Value Propositions</h3>
    <form id="valuePropsForm" onsubmit="saveValueProps(event)">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
            <!-- Prop 1 -->
            <div style="background: #111; padding: 1rem; border-radius: 6px; border: 1px solid var(--border-color);">
                <h4 style="margin-bottom: 1rem; color: var(--accent-gold);">Prop 1 (Quality)</h4>
                <div class="form-group">
                    <label>Icon</label>
                    <select id="prop1Icon" class="form-control">
                        <option value="CROWN">✦ Crown</option>
                        <option value="TRUCK">📦 Truck</option>
                        <option value="DIAMOND">◆ Diamond</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="prop1Title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Text</label>
                    <textarea id="prop1Text" class="form-control" rows="3" required></textarea>
                </div>
            </div>
            <!-- Prop 2 -->
            <div style="background: #111; padding: 1rem; border-radius: 6px; border: 1px solid var(--border-color);">
                <h4 style="margin-bottom: 1rem; color: var(--accent-gold);">Prop 2 (Delivery)</h4>
                <div class="form-group">
                    <label>Icon</label>
                    <select id="prop2Icon" class="form-control">
                        <option value="CROWN">✦ Crown</option>
                        <option value="TRUCK">📦 Truck</option>
                        <option value="DIAMOND">◆ Diamond</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="prop2Title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Text</label>
                    <textarea id="prop2Text" class="form-control" rows="3" required></textarea>
                </div>
            </div>
            <!-- Prop 3 -->
            <div style="background: #111; padding: 1rem; border-radius: 6px; border: 1px solid var(--border-color);">
                <h4 style="margin-bottom: 1rem; color: var(--accent-gold);">Prop 3 (Elegance)</h4>
                <div class="form-group">
                    <label>Icon</label>
                    <select id="prop3Icon" class="form-control">
                        <option value="CROWN">✦ Crown</option>
                        <option value="TRUCK">📦 Truck</option>
                        <option value="DIAMOND">◆ Diamond</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="prop3Title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Text</label>
                    <textarea id="prop3Text" class="form-control" rows="3" required></textarea>
                </div>
            </div>
        </div>
        <button type="submit" class="btn-gold" style="margin-top: 1.5rem; float: right;">Save Value Propositions</button>
        <div style="clear: both;"></div>
    </form>
</div>

<div id="sectionsContainer">
    <!-- Sections populated via JS -->
</div>

{% endblock %}

{% block scripts %}
<script>
    let allProducts = [];
    let homepageContentId = null;

    async function loadData() {
        const prodData = await apiCall('products/?limit=100');
        allProducts = prodData ? prodData.results : [];

        const secData = await apiCall('homepage/sections/');
        if (secData && secData.results) {
            renderSections(secData.results);
        }

        const bannerData = await apiCall('homepage-content/');
        if (bannerData && bannerData.results && bannerData.results.length > 0) {
            const content = bannerData.results[0];
            homepageContentId = content.id;
            document.getElementById('prop1Icon').value = content.prop1_icon || 'CROWN';
            document.getElementById('prop1Title').value = content.prop1_title || '';
            document.getElementById('prop1Text').value = content.prop1_text || '';

            document.getElementById('prop2Icon').value = content.prop2_icon || 'TRUCK';
            document.getElementById('prop2Title').value = content.prop2_title || '';
            document.getElementById('prop2Text').value = content.prop2_text || '';

            document.getElementById('prop3Icon').value = content.prop3_icon || 'DIAMOND';
            document.getElementById('prop3Title').value = content.prop3_title || '';
            document.getElementById('prop3Text').value = content.prop3_text || '';
        }
    }

    async function saveValueProps(e) {
        e.preventDefault();
        if (!homepageContentId) return;

        const payload = {
            prop1_icon: document.getElementById('prop1Icon').value,
            prop1_title: document.getElementById('prop1Title').value,
            prop1_text: document.getElementById('prop1Text').value,
            prop2_icon: document.getElementById('prop2Icon').value,
            prop2_title: document.getElementById('prop2Title').value,
            prop2_text: document.getElementById('prop2Text').value,
            prop3_icon: document.getElementById('prop3Icon').value,
            prop3_title: document.getElementById('prop3Title').value,
            prop3_text: document.getElementById('prop3Text').value,
        };

        const res = await apiCall(`homepage-content/${homepageContentId}/`, 'PATCH', payload);
        if (res) {
            alert('Value Propositions saved successfully!');
        } else {
            alert('Error saving Value Propositions');
        }
    }

    function renderSections(sections) {
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = '';
        
        sections.forEach(sec => {
            const selectedIds = sec.products.map(p => p.id);
            
            let productsHtml = '';
            allProducts.forEach(p => {
                const checked = selectedIds.includes(p.id) ? 'checked' : '';
                productsHtml += `
                    <label class="product-item">
                        <input type="checkbox" value="${p.id}" ${checked} onchange="updateSectionProducts(${sec.id}, this)">
                        ${p.name}
                    </label>
                `;
            });

            container.innerHTML += `
                <div class="section-card" id="section-${sec.id}">
                    <div class="section-header">
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <input type="text" class="form-control" style="font-family: 'Playfair Display', serif; font-size: 1.2rem; width: 300px; color: var(--accent-gold);" value="${sec.title}" onchange="updateSection(${sec.id}, 'title', this.value)">
                            <span style="color:var(--text-muted); font-size:0.8rem; background:#222; padding:0.2rem 0.5rem; border-radius:4px;">${sec.section_type}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                                <input type="checkbox" ${sec.is_active ? 'checked' : ''} onchange="updateSection(${sec.id}, 'is_active', this.checked)"> Active
                            </label>
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <label style="color:var(--text-muted); font-size:0.8rem;">Order:</label>
                                <input type="number" class="form-control" style="width:70px; padding:0.4rem;" value="${sec.display_order}" onchange="updateSection(${sec.id}, 'display_order', this.value)">
                            </div>
                        </div>
                    </div>
                    <div>
                        <label style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.5rem; display:block;">Select Products to Display</label>
                        <div class="product-list" id="products-${sec.id}">
                            ${productsHtml}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function updateSection(id, field, value) {
        const body = {};
        body[field] = value;
        await apiCall(`homepage/sections/${id}/`, 'PATCH', body);
    }

    async function updateSectionProducts(secId, checkboxElem) {
        const container = document.getElementById(`products-${secId}`);
        const checkboxes = container.querySelectorAll('input[type="checkbox"]:checked');
        const productIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

        await apiCall(`homepage/sections/${secId}/`, 'PATCH', { products: productIds });
    }

    document.addEventListener('DOMContentLoaded', () => loadData());
</script>
{% endblock %}
