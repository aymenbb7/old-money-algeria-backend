<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Old Money Algeria Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0A0A0A;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #111111;
            padding: 3rem;
            border-radius: 8px;
            border: 1px solid #222222;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #888888;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background-color: #1A1A1A;
            border: 1px solid #333333;
            color: #E0E0E0;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
        }
        .btn-gold {
            width: 100%;
            background-color: #D4AF37;
            color: #0A0A0A;
            border: none;
            padding: 1rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-gold:hover {
            background-color: #b8962c;
        }
        .error-msg {
            color: #ff4d4d;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">Old Money Algeria</div>
        <div class="error-msg" id="errorMsg">Invalid credentials or unauthorized access.</div>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-gold">Sign In</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/v1/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok && data.access) {
                    localStorage.setItem('oma_access_token', data.access);
                    localStorage.setItem('oma_refresh_token', data.refresh);
                    window.location.href = '/admin/';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
