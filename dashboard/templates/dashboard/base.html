<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Money Algeria - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0A0A0A;
            --card-color: #111111;
            --accent-gold: #D4AF37;
            --success-green: #0B4D2B;
            --text-main: #E0E0E0;
            --text-muted: #888888;
            --border-color: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .brand-font {
            font-family: 'Playfair Display', serif;
        }

        /* Sidebar styling */
        .sidebar {
            width: 280px;
            background-color: var(--card-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            color: var(--accent-gold);
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .menu-item i {
            margin-right: 1rem;
            width: 20px;
            text-align: center;
        }

        .menu-item:hover, .menu-item.active {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            border-right: 3px solid var(--accent-gold);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: calc(100% - 280px);
            transition: margin-left 0.3s ease, width 0.3s ease;
        }

        .topbar {
            height: 70px;
            background-color: var(--card-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info button {
            background: none;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-info button:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        .content-area {
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
        }

        /* Reusable Components */
        .card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-gold {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-gold:hover {
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-success { background-color: rgba(11, 77, 43, 0.2); color: #2e8b57; }
        .status-pending { background-color: rgba(212, 175, 55, 0.2); color: var(--accent-gold); }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .mobile-toggle {
                display: block;
            }
            /* Overlay */
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="brand-font">OMA Admin</h2>
        </div>
        <div class="sidebar-menu">
            <a href="/admin/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_index' %}active{% endif %}"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="/admin/orders/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_orders' %}active{% endif %}"><i class="fas fa-shopping-bag"></i> Orders</a>
            <a href="/admin/products/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_products' %}active{% endif %}"><i class="fas fa-box"></i> Products</a>
            <a href="/admin/categories/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_categories' %}active{% endif %}"><i class="fas fa-tags"></i> Categories</a>
            <a href="/admin/homepage/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_homepage' %}active{% endif %}"><i class="fas fa-home"></i> Homepage</a>
            <a href="/admin/wilayas/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_wilayas' %}active{% endif %}"><i class="fas fa-map-marker-alt"></i> Wilayas & Delivery</a>
            <a href="/admin/coupons/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_coupons' %}active{% endif %}"><i class="fas fa-ticket-alt"></i> Coupons</a>
            <a href="/admin/settings/" class="menu-item {% if request.resolver_match.url_name == 'dashboard_settings' %}active{% endif %}"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="mobile-toggle" id="mobileToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="user-info">
                <span>Admin User</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </header>

        <div class="content-area" id="contentArea">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // Check Auth
        const token = localStorage.getItem('oma_access_token');
        if (!token && window.location.pathname !== '/admin/login/') {
            window.location.href = '/admin/login/';
        }

        // Mobile Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('mobileToggle');

        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            });
        }
        if(overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }

        // Logout
        const logoutBtn = document.getElementById('logoutBtn');
        if(logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('oma_access_token');
                localStorage.removeItem('oma_refresh_token');
                window.location.href = '/admin/login/';
            });
        }

        // API Helper
        async function apiCall(endpoint, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('oma_access_token')}`
            };
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);
            
            try {
                let res = await fetch(`/api/v1/${endpoint}`, options);
                if (res.status === 401) {
                    // Try to refresh token
                    const refresh = localStorage.getItem('oma_refresh_token');
                    if (refresh) {
                        const refRes = await fetch('/api/v1/auth/refresh/', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({refresh})
                        });
                        if (refRes.ok) {
                            const data = await refRes.json();
                            localStorage.setItem('oma_access_token', data.access);
                            options.headers['Authorization'] = `Bearer ${data.access}`;
                            res = await fetch(`/api/v1/${endpoint}`, options);
                        } else {
                            throw new Error("Session expired");
                        }
                    } else {
                        throw new Error("No refresh token");
                    }
                }
                return await res.json();
            } catch (err) {
                console.error(err);
                if (err.message === "Session expired" || err.message === "No refresh token") {
                    window.location.href = '/admin/login/';
                }
                return null;
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
