{% extends 'dashboard/base.html' %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 2rem;">
    <h1 class="brand-font" style="font-size: 2rem; color: var(--text-main);">Collections</h1>
    <p style="color: var(--text-muted);">Manage product collections and hero images.</p>
</div>

<div class="card">
    <div class="card-header">
        <h3 class="brand-font">Collection List</h3>
        <button class="btn-gold" onclick="openCategoryModal()">+ New Collection</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="categoriesTable">
            <thead>
                <tr>
                    <th></th> <!-- Drag handle -->
                    <th>Hero Image</th>
                    <th>Name</th>
                    <th>Slug</th>
                    <th>Products</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="sortableTbody">
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Category Modal -->
<div id="categoryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 class="brand-font" id="modalTitle" style="margin-bottom: 1rem;">New Category</h3>
        <form id="categoryForm" onsubmit="saveCategory(event)">
            <input type="hidden" id="categoryId">
            <div style="margin-bottom: 1rem;">
                <label>Name</label>
                <input type="text" id="catName" required style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); margin-top: 0.5rem;" onkeyup="generateSlug()">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Slug (Auto-generated)</label>
                <input type="text" id="catSlug" style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); margin-top: 0.5rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Thumbnail Image (for cards)</label>
                <div style="display: flex; gap: 1rem; margin: 0.3rem 0;">
                    <label style="cursor:pointer; display:flex; align-items:center; gap:0.2rem; font-size:0.85rem;">
                        <input type="radio" name="catImageMode" value="url" checked onchange="toggleCatImageMode('url')"> URL
                    </label>
                    <label style="cursor:pointer; display:flex; align-items:center; gap:0.2rem; font-size:0.85rem;">
                        <input type="radio" name="catImageMode" value="file" onchange="toggleCatImageMode('file')"> Fichier
                    </label>
                </div>
                
                <input type="text" id="catImageUrl" placeholder="https://images.unsplash.com/photo-..." style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main);" oninput="updateCollectionPreviews()">
                
                <div id="catImageFileUpload" style="display:none; margin-top: 0.3rem;">
                    <input type="file" id="catImageFile" class="form-control" accept="image/*" onchange="uploadCollectionFile('catImageFile', 'catImageUrl', 'catThumbnailPreview', 'catThumbnailPreviewContainer')">
                </div>
                
                <div id="catThumbnailPreviewContainer" style="margin-top: 0.5rem; display: none;">
                    <img id="catThumbnailPreview" src="" style="max-width: 100%; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border-color);">
                </div>
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label>Hero Image (for banner)</label>
                <div style="display: flex; gap: 1rem; margin: 0.3rem 0;">
                    <label style="cursor:pointer; display:flex; align-items:center; gap:0.2rem; font-size:0.85rem;">
                        <input type="radio" name="catHeroImageMode" value="url" checked onchange="toggleCatHeroImageMode('url')"> URL
                    </label>
                    <label style="cursor:pointer; display:flex; align-items:center; gap:0.2rem; font-size:0.85rem;">
                        <input type="radio" name="catHeroImageMode" value="file" onchange="toggleCatHeroImageMode('file')"> Fichier
                    </label>
                </div>
                
                <input type="text" id="catHeroImageUrl" placeholder="https://images.unsplash.com/photo-..." style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main);" oninput="updateCollectionPreviews()">
                
                <div id="catHeroImageFileUpload" style="display:none; margin-top: 0.3rem;">
                    <input type="file" id="catHeroImageFile" class="form-control" accept="image/*" onchange="uploadCollectionFile('catHeroImageFile', 'catHeroImageUrl', 'catHeroPreview', 'catHeroPreviewContainer')">
                </div>
                
                <div id="catHeroPreviewContainer" style="margin-top: 0.5rem; display: none;">
                    <img id="catHeroPreview" src="" style="max-width: 100%; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border-color);">
                </div>
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Display Order</label>
                <input type="number" id="catOrder" value="0" style="width: 100%; padding: 0.8rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); margin-top: 0.5rem;">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="button" class="btn-gold" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main);" onclick="closeCategoryModal()">Cancel</button>
                <button type="submit" class="btn-gold">Save Category</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function fetchCategories() {
        // Categories uses the 'collections' API under the hood
        const data = await apiCall('collections/');
        if (data && data.results) {
            // Sort by display_order
            data.results.sort((a,b) => a.display_order - b.display_order);
            const tbody = document.querySelector('#sortableTbody');
            tbody.innerHTML = '';
            data.results.forEach(cat => {
                const imgStr = cat.image ? `<img src="${cat.image}" width="80" style="border-radius:4px; aspect-ratio: 16/9; object-fit: cover;">` : 'No Image';
                tbody.innerHTML += `
                    <tr draggable="true" data-id="${cat.id}" class="draggable-row" style="cursor: move;">
                        <td style="color:var(--text-muted);">☰</td>
                        <td>${imgStr}</td>
                        <td>${cat.name}</td>
                        <td>${cat.slug}</td>
                        <td>${cat.product_count}</td>
                        <td>
                            <button class="btn-gold" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick='editCategory(${JSON.stringify(cat).replace(/'/g, "&#39;")})'>Edit</button>
                            <button class="btn-gold" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; background: #ff4d4d;" onclick="deleteCategory(${cat.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
            initDragAndDrop();
        }
    }

    function updateCollectionPreviews() {
        const thumbUrl = document.getElementById('catImageUrl').value.trim();
        const heroUrl = document.getElementById('catHeroImageUrl').value.trim();

        const thumbPreview = document.getElementById('catThumbnailPreview');
        const thumbContainer = document.getElementById('catThumbnailPreviewContainer');
        if (thumbUrl) {
            thumbPreview.src = thumbUrl;
            thumbContainer.style.display = 'block';
        } else {
            thumbContainer.style.display = 'none';
        }

        const heroPreview = document.getElementById('catHeroPreview');
        const heroContainer = document.getElementById('catHeroPreviewContainer');
        if (heroUrl) {
            heroPreview.src = heroUrl;
            heroContainer.style.display = 'block';
        } else {
            heroContainer.style.display = 'none';
        }
    }

    function toggleCatImageMode(mode) {
        if(mode === 'url') {
            document.getElementById('catImageUrl').style.display = 'block';
            document.getElementById('catImageFileUpload').style.display = 'none';
        } else {
            document.getElementById('catImageUrl').style.display = 'none';
            document.getElementById('catImageFileUpload').style.display = 'block';
        }
    }

    function toggleCatHeroImageMode(mode) {
        if(mode === 'url') {
            document.getElementById('catHeroImageUrl').style.display = 'block';
            document.getElementById('catHeroImageFileUpload').style.display = 'none';
        } else {
            document.getElementById('catHeroImageUrl').style.display = 'none';
            document.getElementById('catHeroImageFileUpload').style.display = 'block';
        }
    }

    async function uploadCollectionFile(fileInputId, targetUrlInputId, previewImgId, previewContainerId) {
        const fileInput = document.getElementById(fileInputId);
        const urlInput = document.getElementById(targetUrlInputId);
        const previewImg = document.getElementById(previewImgId);
        const previewContainer = document.getElementById(previewContainerId);
        const token = localStorage.getItem('oma_access_token');
        
        if (!fileInput.files.length) return;
        
        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('image', file);
        
        try {
            const res = await fetch('/api/v1/upload-image/', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                urlInput.value = data.url;
                previewImg.src = data.url;
                previewContainer.style.display = 'block';
            } else {
                const errData = await res.json().catch(() => ({error: 'Network error'}));
                console.error("Upload failed for file", file.name, errData);
                alert('Échec du téléversement: ' + (errData.error || errData.detail || 'Erreur Inconnue'));
            }
        } catch (err) {
            console.error(err);
            alert('Erreur lors du téléversement: ' + err.message);
        }
    }

    function openCategoryModal() {
        document.getElementById('categoryModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = 'New Collection';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
        document.getElementById('catImageUrl').value = '';
        document.getElementById('catHeroImageUrl').value = '';
        document.getElementById('catThumbnailPreviewContainer').style.display = 'none';
        document.getElementById('catHeroPreviewContainer').style.display = 'none';
        
        // Reset modes to url
        document.getElementsByName('catImageMode')[0].checked = true;
        toggleCatImageMode('url');
        document.getElementsByName('catHeroImageMode')[0].checked = true;
        toggleCatHeroImageMode('url');
    }

    function closeCategoryModal() {
        document.getElementById('categoryModal').style.display = 'none';
    }

    function editCategory(cat) {
        openCategoryModal();
        document.getElementById('modalTitle').innerText = 'Edit Collection';
        document.getElementById('categoryId').value = cat.id;
        document.getElementById('catName').value = cat.name;
        document.getElementById('catSlug').value = cat.slug;
        document.getElementById('catOrder').value = cat.display_order || 0;
        document.getElementById('catImageUrl').value = cat.image_url || cat.image || '';
        document.getElementById('catHeroImageUrl').value = cat.hero_image_url || '';
        
        // Default to url mode
        document.getElementsByName('catImageMode')[0].checked = true;
        toggleCatImageMode('url');
        document.getElementsByName('catHeroImageMode')[0].checked = true;
        toggleCatHeroImageMode('url');
        
        updateCollectionPreviews();
    }

    function generateSlug() {
        const name = document.getElementById('catName').value;
        const slug = name.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
        document.getElementById('catSlug').value = slug;
    }

    async function saveCategory(e) {
        e.preventDefault();
        const id = document.getElementById('categoryId').value;
        const name = document.getElementById('catName').value;
        const slug = document.getElementById('catSlug').value;
        const display_order = document.getElementById('catOrder').value;
        const image_url = document.getElementById('catImageUrl').value.trim();
        const hero_image_url = document.getElementById('catHeroImageUrl').value.trim();

        const payload = {
            name,
            slug,
            display_order,
            image_url: image_url || null,
            hero_image_url: hero_image_url || null
        };

        const method = id ? 'PATCH' : 'POST';
        const url = id ? `collections/${id}/` : `collections/`;
        
        try {
            const token = localStorage.getItem('oma_access_token');
            const res = await fetch(`/api/v1/${url}`, {
                method: method,
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeCategoryModal();
                fetchCategories();
            } else {
                alert('Error saving category');
            }
        } catch(err) {
            alert('Network error');
        }
    }

    async function deleteCategory(id) {
        if(confirm('Are you sure you want to delete this collection?')) {
            await apiCall(`collections/${id}/`, 'DELETE');
            fetchCategories();
        }
    }

    // Drag and Drop Logic
    let draggedRow = null;

    function initDragAndDrop() {
        const rows = document.querySelectorAll('.draggable-row');
        const tbody = document.getElementById('sortableTbody');

        rows.forEach(row => {
            row.addEventListener('dragstart', function(e) {
                draggedRow = this;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => this.style.opacity = '0.5', 0);
            });

            row.addEventListener('dragend', function() {
                this.style.opacity = '1';
                draggedRow = null;
                updateOrder();
            });

            row.addEventListener('dragover', function(e) {
                e.preventDefault();
            });

            row.addEventListener('dragenter', function(e) {
                e.preventDefault();
                this.style.background = 'rgba(212, 175, 55, 0.1)';
            });

            row.addEventListener('dragleave', function() {
                this.style.background = '';
            });

            row.addEventListener('drop', function(e) {
                this.style.background = '';
                if (draggedRow !== this) {
                    const allRows = Array.from(tbody.children);
                    const draggedIndex = allRows.indexOf(draggedRow);
                    const targetIndex = allRows.indexOf(this);
                    if (draggedIndex < targetIndex) {
                        this.after(draggedRow);
                    } else {
                        this.before(draggedRow);
                    }
                }
            });
        });
    }

    async function updateOrder() {
        const rows = document.querySelectorAll('.draggable-row');
        const updates = [];
        rows.forEach((row, index) => {
            const id = row.getAttribute('data-id');
            updates.push({ id, display_order: index });
        });

        // Send individual PATCH requests
        const token = localStorage.getItem('oma_access_token');
        for (const update of updates) {
            await fetch(`/api/v1/collections/${update.id}/`, {
                method: 'PATCH',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ display_order: update.display_order })
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => fetchCategories());
</script>
{% endblock %}
