services:
  - type: web
    name: old-money-algeria-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_wilayas && python manage.py create_admin
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: old-money-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: old-money-algeria-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://old-money-algeria-frontend.vercel.app,https://old-money-algeria.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: your_cloud_name
      - key: CLOUDINARY_API_KEY
        value: your_api_key
      - key: CLOUDINARY_API_SECRET
        value: your_api_secret

databases:
  - name: old-money-db
    plan: free
